<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Title tag: sets the name of the browser tab -->
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Header Section -->
    <header class="header">
        <h1>My Weather Dashboard</h1>
        <p>Operational forecasting and meteorological data.</p>
    </header>

    <!-- Main Content Area -->
    <div class="main-container">
        
        <!-- Section 1: Interactive NWP Models -->
        <div class="widget">
            <h2>Live Surface Winds (ECMWF)</h2>
            <iframe 
                width="100%" 
                height="450" 
                src="https://embed.windy.com/embed2.html?lat=30.628&lon=-96.334&zoom=5&level=surface&overlay=wind&product=ecmwf&metricWind=kt&metricTemp=%C2%B0F" 
                frameborder="0">
            </iframe>
        </div>

        <!-- Section 2: External Forecasting Resources -->
        <div class="resources">
            <h2>Quick Links</h2>
            <ul>
                <li><a href="https://www.tropicaltidbits.com/">Tropical Tidbits</a></li>
                <!-- You can add more links to things like SPC or NWS here -->
            </ul>
        </div>

    </div>
</body>
</html>
